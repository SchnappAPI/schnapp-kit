# Schnapp Kit Workflow Documentation Cleanup And Ledger Update

## Action

Follow the documentation-cleanup-and-ledger-update workflow:
1. Identify documentation files to remove (e.g., adapter guides, localized docs).
2. Delete the identified files from their respective directories.
3. Update or create entries in docs/cleanup/ledger.tsv to record what was removed and why.
4. Update docs/cleanup/STATUS.md to reflect current cleanup status.
5. Optionally, update docs/cleanup/PLAN.md with future cleanup intentions.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: core/docs/*, docs/cleanup/ledger.tsv, docs/cleanup/STATUS.md

