# Schnapp Kit Workflow Record Cleanup Decision Ledger

## Action

Follow the record-cleanup-decision-ledger workflow:
1. Edit or remove a large set of files (docs, configs, code, etc.) as part of a cleanup or refactor.
2. Update docs/cleanup/ledger.tsv to record the decision and affected files.
3. Update docs/cleanup/STATUS.md to reflect the new status of the cleanup effort.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~8x per month
- Files: docs/cleanup/ledger.tsv, docs/cleanup/STATUS.md

