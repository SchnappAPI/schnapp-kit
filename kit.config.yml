# kit.config.yml — the steering wheel for schnapp-kit.
# See docs/ARCHITECTURE.md for the layer model.

core:
  source: github:affaan-m/ECC
  pinned_commit: 928076cc08cbb31e8549cea2883b4f51811de1c8
  enabled_languages: [python, typescript, sql, bash, yaml]
  pruned_languages:
    [
      java,
      ruby,
      go,
      rust,
      php,
      csharp,
      kotlin,
      swift,
      scala,
      elixir,
      erlang,
      clojure,
      haskell,
      ocaml,
      fsharp,
      dart,
      lua,
      r,
      perl,
    ]
  keep_examples: true

vendored:
  security-guidance:
    source: github:anthropics/claude-code
    subdir: plugins/security-guidance
    pin: main@b7339920b69f4a395c28727a1e2305dc5b122cb2
    enabled_artifacts:
      - hooks/**
      - hooks-handlers/**
      - README.md

  ralph-wiggum:
    source: github:anthropics/claude-code
    subdir: plugins/ralph-wiggum
    pin: main@b7339920b69f4a395c28727a1e2305dc5b122cb2
    enabled_artifacts:
      - commands/**
      - hooks/**
      - scripts/**

  agent-sdk-dev:
    source: github:anthropics/claude-code
    subdir: plugins/agent-sdk-dev
    pin: main@b7339920b69f4a395c28727a1e2305dc5b122cb2
    enabled_artifacts:
      - agents/**
      - commands/**

  plugin-dev:
    source: github:anthropics/claude-code
    subdir: plugins/plugin-dev
    pin: main@b7339920b69f4a395c28727a1e2305dc5b122cb2
    enabled_artifacts:
      - skills/**
      - agents/**
      - commands/**

  # Output-style modes — mutually exclusive; enable at most one at a time
  explanatory-output-style:
    source: github:anthropics/claude-code
    subdir: plugins/explanatory-output-style
    pin: main@b7339920b69f4a395c28727a1e2305dc5b122cb2
    enabled: false
    enabled_artifacts:
      - hooks/**
      - hooks-handlers/**

  learning-output-style:
    source: github:anthropics/claude-code
    subdir: plugins/learning-output-style
    pin: main@b7339920b69f4a395c28727a1e2305dc5b122cb2
    enabled: false
    enabled_artifacts:
      - hooks/**
      - hooks-handlers/**

  mattpocock-skills:
    source: github:mattpocock/skills
    pin: main@b8be62ffacb0118fa3eaa29a0923c87c8c11985c
    enabled_artifacts:
      - skills/engineering/diagnose/**
      - skills/engineering/grill-with-docs/**
      - skills/engineering/improve-codebase-architecture/**
      - skills/engineering/prototype/**
      - skills/engineering/setup-matt-pocock-skills/**
      - skills/engineering/tdd/**
      - skills/engineering/to-issues/**
      - skills/engineering/to-prd/**
      - skills/engineering/triage/**
      - skills/engineering/zoom-out/**
      - skills/productivity/caveman/**
      - skills/productivity/grill-me/**
      - skills/productivity/handoff/**
      - skills/productivity/write-a-skill/**
      - skills/misc/git-guardrails-claude-code/**
      - skills/misc/scaffold-exercises/**
      - skills/misc/setup-pre-commit/**
      - skills/personal/edit-article/**
    disabled_artifacts:
      - skills/deprecated/**
      - skills/in-progress/**
      - skills/misc/migrate-to-shoehorn/**
      - skills/personal/obsidian-vault/**

language_packs_enabled: [python, typescript, sql, infra]

overlays_priority: highest
